<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Universo dos Livros</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style_shared.css">
  <style>
    .carrinho-container {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 30px;
      padding: 60px 8%;
      flex: 1;
    }
    @media(max-width: 900px) {
      .carrinho-container { grid-template-columns: 1fr; padding: 30px 5%; }
    }
    .carrinho-titulo {
      font-size: 2rem;
      font-family: 'Cinzel', serif;
      color: #ffb37a;
      margin-bottom: 30px;
    }
    .item-carrinho {
      display: flex;
      gap: 20px;
      background: #3a3a3a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #555;
      align-items: center;
    }
    .item-carrinho img {
      width: 80px;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .item-info { flex: 1; }
    .item-info h3 { color: #fff; margin-bottom: 6px; font-size: 1rem; }
    .item-info .item-preco { color: #ffb37a; font-weight: bold; font-size: 1rem; }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .qty-controls button {
      background: #555;
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .qty-controls button:hover { background: #ff8c42; }
    .qty-controls span { color: #fff; font-weight: bold; min-width: 20px; text-align: center; }
    .btn-remover {
      background: none;
      border: 1px solid #666;
      color: #aaa;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-remover:hover { border-color: #ff4444; color: #ff4444; }
    .resumo {
      background: #3a3a3a;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid #555;
      align-self: flex-start;
      position: sticky;
      top: 90px;
    }
    .resumo h2 {
      font-family: 'Cinzel', serif;
      color: #ffb37a;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }
    .linha-resumo {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #555;
      color: #ccc;
    }
    .linha-resumo.total {
      border-bottom: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      margin-top: 8px;
    }
    .linha-resumo.total span:last-child { color: #ffb37a; font-size: 1.2rem; }
    .btn-finalizar {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, #ff8c42, #ff6b00);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-finalizar:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-limpar {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: transparent;
      color: #aaa;
      border: 1px solid #666;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-limpar:hover { border-color: #ff4444; color: #ff4444; }
    .carrinho-vazio {
      text-align: center;
      padding: 80px 20px;
      color: #aaa;
    }
    .carrinho-vazio .icon { font-size: 4rem; margin-bottom: 20px; }
    .carrinho-vazio h3 { color: #ffb37a; font-size: 1.5rem; margin-bottom: 10px; font-family: 'Cinzel', serif; }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #333;
      border: 1px solid #ff8c42;
      color: #fff;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">📚 Universo dos Livros</a>
    <nav>
      <a href="index.html">Início</a>
      <a href="livros.html">Livros</a>
      <a href="categorias.html">Categorias</a>
      <a href="contato.html">Contato</a>
      <a href="carrinho.html" class="active">🛒 Carrinho</a>
    </nav>
    <div class="auth-bar">
      <button id="btn-login" class="btn">Entrar</button>
      <button id="btn-register" class="btn btn-outline">Cadastrar</button>
      <div id="user-bar">
        <span id="user-name"></span>
        <button id="btn-logout">Sair</button>
      </div>
    </div>
  </header>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2 id="modal-title">Entrar</h2>
      <div id="field-name" style="display:none">
        <input type="text" id="input-name" placeholder="Seu nome" />
      </div>
      <input type="email" id="input-email" placeholder="E-mail" />
      <input type="password" id="input-password" placeholder="Senha" />
      <button class="btn-full" id="modal-submit">Entrar</button>
      <p class="modal-msg" id="modal-msg"></p>
      <p class="modal-switch" id="modal-switch-text">
        Não tem conta? <a onclick="openModal('register')">Cadastre-se</a>
      </p>
    </div>
  </div>

  <div class="carrinho-container">
    <div id="coluna-itens">
      <h2 class="carrinho-titulo">🛒 Carrinho de Compras</h2>
      <div id="lista-carrinho"></div>
    </div>
    <div class="resumo" id="painel-resumo" style="display:none">
      <h2>Resumo</h2>
      <div class="linha-resumo">
        <span>Subtotal</span>
        <span id="valor-subtotal">R$ 0,00</span>
      </div>
      <div class="linha-resumo">
        <span>Frete</span>
        <span>R$ 15,00</span>
      </div>
      <div class="linha-resumo total">
        <span>Total</span>
        <span id="valor-total">R$ 0,00</span>
      </div>
      <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
      <button class="btn-limpar" onclick="limparCarrinho()">Limpar carrinho</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <h3>📚 Universo dos Livros</h3>
    <p>Seu portal para aventuras literárias inesquecíveis.</p>
  </footer>

<script>
const modalOverlay = document.getElementById('modal-overlay');
const btnLogin = document.getElementById('btn-login');
const btnRegister = document.getElementById('btn-register');
const modalClose = document.getElementById('modal-close');
const modalTitle = document.getElementById('modal-title');
const fieldName = document.getElementById('field-name');
const modalSubmit = document.getElementById('modal-submit');
const modalSwitchText = document.getElementById('modal-switch-text');
const modalMsg = document.getElementById('modal-msg');
const userBar = document.getElementById('user-bar');
const userNameSpan = document.getElementById('user-name');
const btnLogout = document.getElementById('btn-logout');

function checkLogin(){
  const u = JSON.parse(localStorage.getItem('usuarioLogado') || 'null');
  if(u){
    btnLogin.style.display='none';
    btnRegister.style.display='none';
    userBar.style.display='flex';
    userNameSpan.textContent = '👤 ' + u.nome;
  }
}
function openModal(type){
  modalOverlay.style.display='flex';
  modalMsg.textContent='';
  if(type==='register'){
    modalTitle.innerText='Cadastrar';
    fieldName.style.display='block';
    modalSubmit.innerText='Cadastrar';
    modalSwitchText.innerHTML=`Já possui conta? <a onclick="openModal('login')">Entrar</a>`;
  } else {
    modalTitle.innerText='Entrar';
    fieldName.style.display='none';
    modalSubmit.innerText='Entrar';
    modalSwitchText.innerHTML=`Não tem conta? <a onclick="openModal('register')">Cadastre-se</a>`;
  }
}
btnLogin.addEventListener('click',()=>openModal('login'));
btnRegister.addEventListener('click',()=>openModal('register'));
modalClose.addEventListener('click',()=>{modalOverlay.style.display='none';});
window.addEventListener('click',(e)=>{if(e.target===modalOverlay)modalOverlay.style.display='none';});
btnLogout.addEventListener('click',()=>{ localStorage.removeItem('usuarioLogado'); location.reload(); });
modalSubmit.addEventListener('click',()=>{
  const email = document.getElementById('input-email').value.trim();
  const senha = document.getElementById('input-password').value;
  if(modalTitle.innerText==='Cadastrar'){
    const nome = document.getElementById('input-name').value.trim();
    if(!nome||!email||!senha){modalMsg.textContent='Preencha todos os campos.';return;}
    let usuarios = JSON.parse(localStorage.getItem('usuarios')||'[]');
    if(usuarios.find(u=>u.email===email)){modalMsg.textContent='E-mail já cadastrado.';return;}
    usuarios.push({nome,email,senha});
    localStorage.setItem('usuarios',JSON.stringify(usuarios));
    localStorage.setItem('usuarioLogado',JSON.stringify({nome,email}));
    modalOverlay.style.display='none'; checkLogin();
  } else {
    if(!email||!senha){modalMsg.textContent='Preencha todos os campos.';return;}
    let usuarios = JSON.parse(localStorage.getItem('usuarios')||'[]');
    const u = usuarios.find(u=>u.email===email&&u.senha===senha);
    if(!u){modalMsg.textContent='E-mail ou senha incorretos.';return;}
    localStorage.setItem('usuarioLogado',JSON.stringify({nome:u.nome,email:u.email}));
    modalOverlay.style.display='none'; checkLogin();
  }
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function fmt(v){ return 'R$ ' + v.toFixed(2).replace('.', ','); }

function renderCarrinho(){
  const carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
  const lista = document.getElementById('lista-carrinho');
  const resumo = document.getElementById('painel-resumo');
  lista.innerHTML = '';
  if(carrinho.length === 0){
    resumo.style.display = 'none';
    lista.innerHTML = `
      <div class="carrinho-vazio">
        <div class="icon">🛒</div>
        <h3>Seu carrinho está vazio</h3>
        <p style="margin-bottom:20px;color:#aaa">Que tal explorar nossos livros?</p>
        <a href="livros.html" class="btn">Ver Livros</a>
      </div>`;
    return;
  }
  resumo.style.display = 'block';
  let subtotal = 0;
  carrinho.forEach((livro, i) => {
    const precoUnit = parseFloat(livro.preco.replace('R$','').replace(',','.').trim());
    subtotal += precoUnit * livro.quantidade;
    lista.innerHTML += `
      <div class="item-carrinho">
        <img src="${livro.imagem}" alt="${livro.nome}" onerror="this.src='https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=120'">
        <div class="item-info">
          <h3>${livro.nome}</h3>
          <div class="item-preco">${fmt(precoUnit * livro.quantidade)}</div>
          <div class="qty-controls">
            <button onclick="mudarQtd(${i}, -1)">−</button>
            <span>${livro.quantidade}</span>
            <button onclick="mudarQtd(${i}, 1)">+</button>
          </div>
        </div>
        <button class="btn-remover" onclick="remover(${i})">🗑 Remover</button>
      </div>`;
  });
  document.getElementById('valor-subtotal').textContent = fmt(subtotal);
  document.getElementById('valor-total').textContent = fmt(subtotal + 15);
}

function mudarQtd(i, delta){
  let c = JSON.parse(localStorage.getItem('carrinho')) || [];
  c[i].quantidade += delta;
  if(c[i].quantidade <= 0) c.splice(i, 1);
  localStorage.setItem('carrinho', JSON.stringify(c));
  renderCarrinho();
}
function remover(i){
  let c = JSON.parse(localStorage.getItem('carrinho')) || [];
  c.splice(i, 1);
  localStorage.setItem('carrinho', JSON.stringify(c));
  renderCarrinho();
  showToast('Item removido do carrinho');
}
function limparCarrinho(){
  localStorage.removeItem('carrinho');
  renderCarrinho();
  showToast('Carrinho esvaziado');
}
function finalizarCompra(){
  const usuario = JSON.parse(localStorage.getItem('usuarioLogado') || 'null');
  if(!usuario){ openModal('login'); return; }
  localStorage.removeItem('carrinho');
  renderCarrinho();
  showToast('✅ Compra finalizada! Obrigado, ' + usuario.nome + '!');
}

checkLogin();
renderCarrinho();
</script>
</body>
</html>
