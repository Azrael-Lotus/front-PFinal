<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livros - Universo dos Livros</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style_shared.css">
  
</head>
<body>
  <header>
    <a href="index.html" class="logo">📚 Universo dos Livros</a>
    <nav>
      <a href="index.html">Início</a>
      <a href="livros.html" class="active">Livros</a>
      <a href="categorias.html">Categorias</a>
      <a href="contato.html">Contato</a>
      <a href="carrinho.html">🛒 Carrinho</a>
    </nav>
    <div class="auth-bar">
      <button id="btn-login" class="btn">Entrar</button>
      <button id="btn-register" class="btn btn-outline">Cadastrar</button>
      <div id="user-bar">
        <span id="user-name"></span>
        <button id="btn-logout">Sair</button>
      </div>
    </div>
  </header>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <h2 id="modal-title">Entrar</h2>
      <div id="field-name" style="display:none">
        <input type="text" id="input-name" placeholder="Seu nome" />
      </div>
      <input type="email" id="input-email" placeholder="E-mail" />
      <input type="password" id="input-password" placeholder="Senha" />
      <button class="btn-full" id="modal-submit">Entrar</button>
      <p class="modal-msg" id="modal-msg"></p>
      <p class="modal-switch" id="modal-switch-text">
        Não tem conta? <a onclick="openModal('register')">Cadastre-se</a>
      </p>
    </div>
  </div>

  <!-- MODAL ADICIONAR LIVRO -->
  <div id="modal-add-book" class="modal-overlay" style="display:none;">
    <div class="modal" style="max-width:460px;width:90%;">
      <button class="modal-close" id="close-add-book">&times;</button>
      <h2 style="margin-bottom:18px;">➕ Adicionar Livro</h2>
      <input type="text" id="book-titulo" placeholder="Título do livro" style="margin-bottom:10px;" />
      <input type="text" id="book-autor" placeholder="Autor" style="margin-bottom:10px;" />
      <select id="book-categoria" style="margin-bottom:10px;width:100%;padding:12px;border-radius:10px;background:#3a3a3a;color:#f5f5f5;border:1px solid #555;font-size:1rem;">
        <option value="">Selecione a categoria</option>
        <option value="Fantasia">Fantasia</option>
        <option value="Romance">Romance</option>
        <option value="Ficção Científica">Ficção Científica</option>
        <option value="Terror">Terror</option>
        <option value="Clássicos">Clássicos</option>
        <option value="Anime">Anime</option>
        <option value="Tecnologia">Tecnologia</option>
      </select>
      <input type="text" id="book-descricao" placeholder="Descrição curta" style="margin-bottom:10px;" />
      <input type="text" id="book-preco" placeholder="Preço (ex: R$ 39,90)" style="margin-bottom:10px;" />
      <input type="text" id="book-imagem" placeholder="URL da imagem (opcional)" style="margin-bottom:16px;" />
      <button class="btn-full" id="salvar-livro">Salvar Livro</button>
      <p id="msg-add-book" class="modal-msg"></p>
    </div>
  </div>

  <div class="page-hero">
    <h1>📚 Todos os Livros</h1>
    <p>Explore nossa coleção completa</p>
    <button class="btn" id="btn-add-book" style="margin-top:16px;font-size:1rem;">➕ Adicionar Livro</button>
  </div>
  <section class="books">
    <div class="cards" id="lista-cards">
    </div>
  </section>

  <footer>
    <h3>📚 Universo dos Livros</h3>
    <p>Seu portal para aventuras literárias inesquecíveis.</p>
  </footer>

<script>
const modalOverlay = document.getElementById('modal-overlay');
const btnLogin = document.getElementById('btn-login');
const btnRegister = document.getElementById('btn-register');
const modalClose = document.getElementById('modal-close');
const modalTitle = document.getElementById('modal-title');
const fieldName = document.getElementById('field-name');
const modalSubmit = document.getElementById('modal-submit');
const modalSwitchText = document.getElementById('modal-switch-text');
const modalMsg = document.getElementById('modal-msg');
const userBar = document.getElementById('user-bar');
const userNameSpan = document.getElementById('user-name');
const btnLogout = document.getElementById('btn-logout');

function checkLogin(){
  const u = JSON.parse(localStorage.getItem('usuarioLogado') || 'null');
  if(u){
    btnLogin.style.display='none';
    btnRegister.style.display='none';
    userBar.style.display='flex';
    userNameSpan.textContent = '👤 ' + u.nome;
  }
}

function openModal(type){
  modalOverlay.style.display='flex';
  modalMsg.textContent='';
  if(type==='register'){
    modalTitle.innerText='Cadastrar';
    fieldName.style.display='block';
    modalSubmit.innerText='Cadastrar';
    modalSwitchText.innerHTML=`Já possui conta? <a onclick="openModal('login')">Entrar</a>`;
  } else {
    modalTitle.innerText='Entrar';
    fieldName.style.display='none';
    modalSubmit.innerText='Entrar';
    modalSwitchText.innerHTML=`Não tem conta? <a onclick="openModal('register')">Cadastre-se</a>`;
  }
}

btnLogin.addEventListener('click',()=>openModal('login'));
btnRegister.addEventListener('click',()=>openModal('register'));
modalClose.addEventListener('click',()=>{modalOverlay.style.display='none';});
window.addEventListener('click',(e)=>{if(e.target===modalOverlay)modalOverlay.style.display='none';});

btnLogout.addEventListener('click',()=>{
  localStorage.removeItem('usuarioLogado');
  location.reload();
});

modalSubmit.addEventListener('click',()=>{
  const email = document.getElementById('input-email').value.trim();
  const senha = document.getElementById('input-password').value;
  if(modalTitle.innerText==='Cadastrar'){
    const nome = document.getElementById('input-name').value.trim();
    if(!nome||!email||!senha){modalMsg.textContent='Preencha todos os campos.';return;}
    let usuarios = JSON.parse(localStorage.getItem('usuarios')||'[]');
    if(usuarios.find(u=>u.email===email)){modalMsg.textContent='E-mail já cadastrado.';return;}
    usuarios.push({nome,email,senha});
    localStorage.setItem('usuarios',JSON.stringify(usuarios));
    localStorage.setItem('usuarioLogado',JSON.stringify({nome,email}));
    modalOverlay.style.display='none';
    checkLogin();
  } else {
    if(!email||!senha){modalMsg.textContent='Preencha todos os campos.';return;}
    let usuarios = JSON.parse(localStorage.getItem('usuarios')||'[]');
    const u = usuarios.find(u=>u.email===email&&u.senha===senha);
    if(!u){modalMsg.textContent='E-mail ou senha incorretos.';return;}
    localStorage.setItem('usuarioLogado',JSON.stringify({nome:u.nome,email:u.email}));
    modalOverlay.style.display='none';
    checkLogin();
  }
});

checkLogin();
</script>
<script>
// Livros padrão do sistema
const livrosPadrao = [
  { titulo: 'Spy x Family', autor: '', categoria: 'Anime', descricao: 'O espião Twilight precisa formar uma família falsa para sua missão. Mas a filha adotada é telepata e a esposa é uma assassina secreta.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=400&auto=format&fit=crop', badge: '🦊 Anime' },
  { titulo: 'Harry Potter', autor: 'J.K. Rowling', categoria: 'Fantasia', descricao: 'Magia, aventura e amizade em Hogwarts.', preco: 'R$ 45,90', imagem: 'https://images-na.ssl-images-amazon.com/images/I/81iqZ2HHD-L.jpg', badge: '⭐ Destaque' },
  { titulo: 'Senhor dos Anéis', autor: 'J.R.R. Tolkien', categoria: 'Fantasia', descricao: 'Uma aventura épica pela Terra Média.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1469395446868-fb6a048d5ca3?q=80&w=400&auto=format&fit=crop', badge: '🏆 Clássico' },
  { titulo: 'Para Todos os Garotos que Já Amei', autor: 'Jenny Han', categoria: 'Romance', descricao: 'Uma comédia romântica adolescente sobre o primeiro amor.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1474932430478-367dbb6832c1?q=80&w=400&auto=format&fit=crop', badge: '💕 Romance' },
  { titulo: 'Código Limpo', autor: 'Robert C. Martin', categoria: 'Tecnologia', descricao: 'Aprenda boas práticas de programação com Robert C. Martin.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1519682337058-a94d519337bc?q=80&w=400&auto=format&fit=crop', badge: '' },
  { titulo: '1984', autor: 'George Orwell', categoria: 'Ficção Científica', descricao: 'O clássico distópico de George Orwell sobre vigilância e controle.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400&auto=format&fit=crop', badge: '' },
  { titulo: 'Drácula', autor: 'Bram Stoker', categoria: 'Terror', descricao: 'O clássico do terror gótico de Bram Stoker que assombra gerações.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=400&auto=format&fit=crop', badge: '' },
  { titulo: 'Dom Quixote', autor: 'Cervantes', categoria: 'Clássicos', descricao: 'O cavaleiro errante de Cervantes numa aventura épica e atemporal.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1541963463532-d68292c34b19?q=80&w=400&auto=format&fit=crop', badge: '📖 Clássico' },
  { titulo: 'Fundação', autor: 'Isaac Asimov', categoria: 'Ficção Científica', descricao: 'A saga de Isaac Asimov sobre o colapso e renascimento de uma civilização galáctica.', preco: 'R$ 45,90', imagem: 'https://images.unsplash.com/photo-1446776653964-20c1d3a81b06?q=80&w=400&auto=format&fit=crop', badge: '🚀 Ficção' },
];

function getLivros() {
  const salvos = JSON.parse(localStorage.getItem('livros_extras') || '[]');
  return [...livrosPadrao, ...salvos];
}

function criarCardHTML(livro, index) {
  const extra = index >= livrosPadrao.length;
  return `
    <div class="card" data-index="${index}">
      ${livro.badge ? `<div class="card-badge">${livro.badge}</div>` : ''}
      ${extra ? `<button class="btn-remover-livro" data-index="${index}" title="Remover livro" style="position:absolute;top:10px;right:10px;background:#cc3300;color:white;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;z-index:2;">✕</button>` : ''}
      <img src="${livro.imagem || 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=400&auto=format&fit=crop'}" alt="${livro.titulo}" onerror="this.src='https://images.unsplash.com/photo-1481627834876-b7833e8f5570?q=80&w=400&auto=format&fit=crop'">
      <div class="card-content">
        <span class="card-category">${livro.categoria}</span>
        <h3>${livro.titulo}</h3>
        <p>${livro.descricao}</p>
        <p class="preco">${livro.preco}</p>
        <button class="btn-comprar">Adicionar ao Carrinho</button>
      </div>
    </div>
  `;
}

function renderizarLivros() {
  const lista = document.getElementById('lista-cards');
  const livros = getLivros();
  lista.innerHTML = livros.map((l, i) => criarCardHTML(l, i)).join('');

  // Botões carrinho
  document.querySelectorAll('.btn-comprar').forEach((botao) => {
    botao.addEventListener('click', () => {
      const card = botao.closest('.card');
      const nome = card.querySelector('h3').innerText;
      const preco = card.querySelector('.preco').innerText;
      const img = card.querySelector('img');
      const imagem = img ? img.src : '';
      const livro = { nome, preco, imagem, quantidade: 1 };
      let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
      const existente = carrinho.find(item => item.nome === nome);
      if (existente) { existente.quantidade += 1; } else { carrinho.push(livro); }
      localStorage.setItem('carrinho', JSON.stringify(carrinho));
      botao.textContent = '✓ Adicionado!';
      setTimeout(() => { botao.textContent = 'Adicionar ao Carrinho'; }, 1500);
    });
  });

  // Botões remover
  document.querySelectorAll('.btn-remover-livro').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.index) - livrosPadrao.length;
      if (idx < 0) return;
      let extras = JSON.parse(localStorage.getItem('livros_extras') || '[]');
      extras.splice(idx, 1);
      localStorage.setItem('livros_extras', JSON.stringify(extras));
      renderizarLivros();
    });
  });
}

// Modal adicionar livro
const modalAddBook = document.getElementById('modal-add-book');
document.getElementById('btn-add-book').addEventListener('click', () => {
  modalAddBook.style.display = 'flex';
});
document.getElementById('close-add-book').addEventListener('click', () => {
  modalAddBook.style.display = 'none';
});
window.addEventListener('click', (e) => {
  if (e.target === modalAddBook) modalAddBook.style.display = 'none';
});

document.getElementById('salvar-livro').addEventListener('click', () => {
  const titulo = document.getElementById('book-titulo').value.trim();
  const autor = document.getElementById('book-autor').value.trim();
  const categoria = document.getElementById('book-categoria').value;
  const descricao = document.getElementById('book-descricao').value.trim();
  const preco = document.getElementById('book-preco').value.trim();
  const imagem = document.getElementById('book-imagem').value.trim();
  const msg = document.getElementById('msg-add-book');

  if (!titulo || !categoria || !descricao || !preco) {
    msg.textContent = 'Preencha título, categoria, descrição e preço.';
    return;
  }

  const novoLivro = { titulo, autor, categoria, descricao, preco, imagem, badge: '' };
  let extras = JSON.parse(localStorage.getItem('livros_extras') || '[]');
  extras.push(novoLivro);
  localStorage.setItem('livros_extras', JSON.stringify(extras));

  // Limpar formulário
  ['book-titulo','book-autor','book-descricao','book-preco','book-imagem'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('book-categoria').value = '';
  msg.textContent = '✅ Livro adicionado com sucesso!';
  setTimeout(() => {
    modalAddBook.style.display = 'none';
    msg.textContent = '';
  }, 1200);

  renderizarLivros();
});

renderizarLivros();
</script>
</html>
